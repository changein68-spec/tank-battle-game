// --- 音效系统 (Web Audio API) ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { /* ignore audio errors */ }
}

function sfxExplode() { playSound(30, 0.3, 'sawtooth', 0.12); }

// --- 工具函数 ---
function getTile(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return STEEL;
  return mapData[row * COLS + col];
}

function setTile(col, row, value) {
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    mapData[row * COLS + col] = value;
  }
}

function tileCol(px) { return Math.floor(px / TILE_SIZE); }
function tileRow(py) { return Math.floor(py / TILE_SIZE); }

function collidesWithMap(x, y, w, h) {
  // 检查指定矩形是否与地图碰撞
  const left = tileCol(x);
  const right = tileCol(x + w - 1);
  const top = tileRow(y);
  const bottom = tileRow(y + h - 1);
  for (let r = top; r <= bottom; r++) {
    for (let c = left; c <= right; c++) {
      const t = getTile(c, r);
      if (t === BRICK || t === STEEL || t === BASE) return true;
      if (t === WATER) return true;
    }
  }
  return false;
}

function collidesWithWater(x, y, w, h) {
  const left = tileCol(x);
  const right = tileCol(x + w - 1);
  const top = tileRow(y);
  const bottom = tileRow(y + h - 1);
  for (let r = top; r <= bottom; r++) {
    for (let c = left; c <= right; c++) {
      if (getTile(c, r) === WATER) return true;
    }
  }
  return false;
}

// --- 粒子系统 ---
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 15,
      maxLife: 30,
      color,
      size: 1.5 + Math.random() * 2.5,
    });
  }
}

// --- 子弹 ---
class Bullet {
  constructor(x, y, dir, speed, owner, damage = 1) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = speed;
    this.owner = owner; // 'player' | 'enemy'
    this.damage = damage;
    this.alive = true;
    this.w = 3;
    this.h = 3;
    this.powerBullet = damage >= 2;
  }

  update() {
    switch (this.dir) {
      case UP:    this.y -= this.speed; break;
      case DOWN:  this.y += this.speed; break;
      case LEFT:  this.x -= this.speed; break;
      case RIGHT: this.x += this.speed; break;
    }

    // 边界检测
    if (this.x < 0 || this.x > FIELD_W - 2 || this.y < 0 || this.y > FIELD_H - 2) {
      this.alive = false;
      return;
    }

    // 地图碰撞
    const cx = tileCol(this.x);
    const cy = tileRow(this.y);
    const tile = getTile(cx, cy);

    if (tile === BRICK) {
      setTile(cx, cy, EMPTY);
      this.alive = false;
      spawnParticles(cx * TILE_SIZE + TILE_SIZE / 2, cy * TILE_SIZE + TILE_SIZE / 2, '#d4894a', 6);
      sfxHit();
    } else if (tile === STEEL) {
      if (this.powerBullet) {
        setTile(cx, cy, EMPTY);
        spawnParticles(cx * TILE_SIZE + TILE_SIZE / 2, cy * TILE_SIZE + TILE_SIZE / 2, '#ccc', 8);
      }
      this.alive = false;
      sfxHit();
    } else if (tile === BASE) {
      setTile(cx, cy, EMPTY);
      this.alive = false;
      spawnParticles(cx * TILE_SIZE + TILE_SIZE / 2, cy * TILE_SIZE + TILE_SIZE / 2, '#f00', 12);
      sfxExplode();
      gameOver();
    }
  }

  draw(ctx) {
    const size = this.powerBullet ? 4 : 3;
    ctx.fillStyle = this.owner === 'player' ? '#f5c842' : '#e94560';
    ctx.shadowColor = this.owner === 'player' ? '#f5c842' : '#e94560';
    ctx.shadowBlur = this.powerBullet ? 8 : 4;
    ctx.fillRect(
      Math.round(this.x - size / 2),
      Math.round(this.y - size / 2),
      size, size
    );
    ctx.shadowBlur = 0;
  }
}

  constructor(x, y, dir, color, speed) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.speed = speed;
    this.w = TILE_SIZE * 2 - 2; // 30px
    this.h = TILE_SIZE * 2 - 2;
    this.alive = true;
    this.shootCooldown = 0;
    this.shootDelay = 30; // frames between shots
    this.moving = false;
    this.animFrame = 0;
  }

  collidesWith(other) {
    return (
      this.x < other.x + other.w &&
      this.x + this.w > other.x &&
      this.y < other.y + other.h &&
      this.y + this.h > other.y
    );
  }

  draw(ctx) {
    if (!this.alive) return;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((this.dir * Math.PI) / 2);
    ctx.fillStyle = this.color;

    // 履带动画
    const trackOffset = this.moving ? (this.animFrame % 8 < 4 ? 0 : 1) : 0;

    // 车身
    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);

    // 履带
    ctx.fillStyle = '#111';
    ctx.fillRect(-this.w / 2, -this.h / 2, 4, this.h);
    ctx.fillRect(this.w / 2 - 4, -this.h / 2, 4, this.h);

    // 履带纹理
    ctx.fillStyle = '#333';
    for (let i = 0; i < 5; i++) {
      const ty = -this.h / 2 + 3 + i * 6 + trackOffset;
      if (ty < this.h / 2 - 2) {
        ctx.fillRect(-this.w / 2, ty, 4, 2);
        ctx.fillRect(this.w / 2 - 4, ty, 4, 2);
      }
    }

    // 炮塔
    ctx.fillStyle = this.color;
    const turretW = this.w * 0.55;
    const turretH = this.h * 0.55;
    ctx.fillRect(-turretW / 2, -turretH / 2, turretW, turretH);

    // 炮管
    ctx.fillStyle = this.color;
    const barrelW = 5;
    const barrelH = this.h * 0.55;
    ctx.fillRect(-barrelW / 2, -barrelH, barrelW, barrelH);

    // 炮管高亮
    ctx.fillStyle = lightenColor(this.color, 0.3);
    ctx.fillRect(-barrelW / 2 + 1, -barrelH, barrelW - 2, barrelH);

    ctx.restore();
  }
}

function lightenColor(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const lr = Math.min(255, Math.floor(r + (255 - r) * factor));
  const lg = Math.min(255, Math.floor(g + (255 - g) * factor));
  const lb = Math.min(255, Math.floor(b + (255 - b) * factor));
  return `rgb(${lr},${lg},${lb})`;
}

// --- 玩家坦克 ---
class PlayerTank extends Tank {
  constructor(x, y) {
    super(x, y, UP, '#3cb043', 1.8);
    this.powerLevel = 0; // 0=普通, 1=快速, 2=双发, 3=强力
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.invincibleTimer = 0;
  }

  update() {
    if (!this.alive) return;

    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.shieldTimer > 0) {
      this.shieldTimer--;
      if (this.shieldTimer <= 0) this.shieldActive = false;
    }
    if (this.invincibleTimer > 0) this.invincibleTimer--;

    let moveDir = -1;
    if (keys['w'] || keys['arrowup'])    moveDir = UP;
    if (keys['s'] || keys['arrowdown'])  moveDir = DOWN;
    if (keys['a'] || keys['arrowleft'])  moveDir = LEFT;
    if (keys['d'] || keys['arrowright']) moveDir = RIGHT;

    this.moving = false;
    if (moveDir !== -1) {
      this.dir = moveDir;
      const speed = this.speed * (this.powerLevel >= 1 ? 1.3 : 1);
      let nx = this.x, ny = this.y;
      switch (moveDir) {
        case UP:    ny -= speed; break;
        case DOWN:  ny += speed; break;
        case LEFT:  nx -= speed; break;
        case RIGHT: nx += speed; break;
      }

      // 边界检查和地图碰撞
      if (nx >= 0 && nx + this.w <= FIELD_W && ny >= 0 && ny + this.h <= FIELD_H) {
        if (!collidesWithMap(nx, ny, this.w, this.h)) {
          // 检查与其他坦克的碰撞
          let blocked = false;
          for (const enemy of enemies) {
            if (enemy.alive && this.tankCollides(nx, ny, enemy)) {
              blocked = true;
              break;
            }
          }
          if (!blocked) {
            this.x = nx;
            this.y = ny;
            this.moving = true;
          }
        }
      }
    }

    if (this.moving) {
      this.animFrame++;
      // 不准进入水
      if (collidesWithWater(this.x, this.y, this.w, this.h)) {
        // 回退
        switch (this.dir) {
          case UP:    this.y += this.speed; break;
          case DOWN:  this.y -= this.speed; break;
          case LEFT:  this.x += this.speed; break;
          case RIGHT: this.x -= this.speed; break;
        }
      }
    }

    // 射击（空格/J/鼠标左键）
    if ((keys['j'] || keys[' '] || keys['space']) && this.shootCooldown <= 0) {
      this.shoot();
    }
  }

  tankCollides(nx, ny, other) {
    return (
      nx < other.x + other.w &&
      nx + this.w > other.x &&
      ny < other.y + other.h &&
      ny + this.h > other.y
    );
  }

  shoot() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    let bx = cx, by = cy;
    const offset = this.h / 2 + 2;
    switch (this.dir) {
      case UP:    by = this.y - 4; break;
      case DOWN:  by = this.y + this.h + 4; break;
      case LEFT:  bx = this.x - 4; break;
      case RIGHT: bx = this.x + this.w + 4; break;
    }

    if (this.powerLevel >= 2) {
      // 双发
      bullets.push(new Bullet(bx, by, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
      if (this.dir === UP || this.dir === DOWN) {
        bullets.push(new Bullet(bx - 5, by, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
        bullets.push(new Bullet(bx + 5, by, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
      } else {
        bullets.push(new Bullet(bx, by - 5, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
        bullets.push(new Bullet(bx, by + 5, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
      }
    } else {
      bullets.push(new Bullet(bx, by, this.dir, 4, 'player', this.powerLevel >= 3 ? 2 : 1));
    }

    this.shootCooldown = this.powerLevel >= 1 ? 18 : this.shootDelay;
    sfxShoot();
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer / 4) % 2 === 0) return;

    super.draw(ctx);

    // 护盾效果
    if (this.shieldActive) {
      const cx = this.x + this.w / 2;
      const cy = this.y + this.h / 2;
      ctx.strokeStyle = '#00bfff';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#00bfff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(cx, cy, this.w * 0.8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  hit() {
    if (this.shieldActive || this.invincibleTimer > 0) return false;
    this.alive = false;
    spawnParticles(this.x + this.w / 2, this.y + this.h / 2, '#3cb043', 16);
    sfxExplode();
    return true;
  }
}

// --- 敌人坦克 ---
class EnemyTank extends Tank {
  constructor(x, y, type = 0) {
    const colors = ['#e94560', '#ff6b35', '#c73e77', '#d43f3f'];
    const speeds = [1.0, 1.2, 1.5, 1.8];
    super(x, y, DOWN, colors[Math.min(type, 3)], speeds[Math.min(type, 3)]);
    this.type = Math.min(type, 3);
    this.aiTimer = 0;
    this.aiChangeInterval = 40 + Math.random() * 60;
    this.shootDelay = this.type >= 3 ? 25 : this.type >= 1 ? 40 : 60;
  }

  update() {
    if (!this.alive) return;

    if (this.shootCooldown > 0) this.shootCooldown--;

    this.aiTimer++;
    this.moving = true;

    // AI: 随机改变方向
    if (this.aiTimer >= this.aiChangeInterval) {
      this.aiTimer = 0;
      this.aiChangeInterval = 30 + Math.random() * 80;

      // 有概率朝玩家方向移动
      if (player && player.alive && Math.random() < 0.35) {
        const dx = (player.x + player.w / 2) - (this.x + this.w / 2);
        const dy = (player.y + player.h / 2) - (this.y + this.h / 2);
        if (Math.abs(dx) > Math.abs(dy)) {
          this.dir = dx > 0 ? RIGHT : LEFT;
        } else {
          this.dir = dy > 0 ? DOWN : UP;
        }
      } else {
        this.dir = Math.floor(Math.random() * 4);
      }
    }

    // 移动
    let nx = this.x, ny = this.y;
    switch (this.dir) {
      case UP:    ny -= this.speed; break;
      case DOWN:  ny += this.speed; break;
      case LEFT:  nx -= this.speed; break;
      case RIGHT: nx += this.speed; break;
    }

    let blocked = false;
    if (nx < 0 || nx + this.w > FIELD_W || ny < 0 || ny + this.h > FIELD_H) {
      blocked = true;
    } else if (collidesWithMap(nx, ny, this.w, this.h)) {
      blocked = true;
    } else {
      // 检查与其他坦克的碰撞
      if (player && player.alive && this !== player) {
        if (nx < player.x + player.w && nx + this.w > player.x &&
            ny < player.y + player.h && ny + this.h > player.y) {
          blocked = true;
        }
      }
      for (const other of enemies) {
        if (other !== this && other.alive) {
          if (nx < other.x + other.w && nx + this.w > other.x &&
              ny < other.y + other.h && ny + this.h > other.y) {
            blocked = true;
            break;
          }
        }
      }
    }

    if (blocked) {
      this.dir = Math.floor(Math.random() * 4);
      this.aiTimer = this.aiChangeInterval - 10;
      this.moving = false;
    } else {
      this.x = nx;
      this.y = ny;
      this.animFrame++;
    }

    // 射击
    if (this.shootCooldown <= 0 && Math.random() < 0.02) {
      this.shoot();
    }

    // 离玩家近时射速提高
    if (player && player.alive && this.shootCooldown <= 0) {
      const dx = (player.x + player.w / 2) - (this.x + this.w / 2);
      const dy = (player.y + player.h / 2) - (this.y + this.h / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120 && Math.random() < 0.04) {
        this.shoot();
      }
    }
  }

  shoot() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    let bx = cx, by = cy;
    switch (this.dir) {
      case UP:    by = this.y - 4; break;
      case DOWN:  by = this.y + this.h + 4; break;
      case LEFT:  bx = this.x - 4; break;
      case RIGHT: bx = this.x + this.w + 4; break;
    }
    bullets.push(new Bullet(bx, by, this.dir, 3, 'enemy'));
    this.shootCooldown = this.shootDelay + Math.random() * 30;
  }

  hit() {
    this.alive = false;
    enemiesAlive--;
    score += (this.type + 1) * 100;
    spawnParticles(this.x + this.w / 2, this.y + this.h / 2, this.color, 14);
    sfxExplode();

    // 随机掉落道具
    if (Math.random() < 0.25) {
      const type = Math.random();
      let pType;
      if (type < 0.3) pType = 'star';
      else if (type < 0.5) pType = 'shield';
      else if (type < 0.65) pType = 'bomb';
      else if (type < 0.8) pType = 'clock';
      else pType = 'shovel';
      powerUps.push({
        x: this.x + this.w / 2 - 10,
        y: this.y + this.h / 2 - 10,
        w: 20, h: 20,
        type: pType,
        timer: 600,
      });
    }

    updateUI();
    return true;
  }
}

// --- 道具效果 ---
function applyPowerUp(type) {
  sfxPowerUp();
  switch (type) {
    case 'star':
      player.powerLevel = Math.min(3, player.powerLevel + 1);
      break;
    case 'shield':
      player.shieldActive = true;
      player.shieldTimer = 480; // ~8秒
      break;
    case 'bomb':
      // 消灭所有敌人
      for (const enemy of enemies) {
        if (enemy.alive) {
          enemy.alive = false;
          enemiesAlive--;
          score += 100;
          spawnParticles(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.color, 10);
        }
      }
      shakeTimer = 20;
      shakeIntensity = 5;
      break;
    case 'clock':
      // 冻结所有敌人
      for (const enemy of enemies) {
        enemy.aiChangeInterval = 9999;
      }
      setTimeout(() => {
        for (const enemy of enemies) {
          if (enemy.alive) enemy.aiChangeInterval = 40 + Math.random() * 60;
        }
      }, 5000);
      break;
    case 'shovel':
      // 修复基地周围的墙
      for (let r = ROWS - 4; r < ROWS; r++) {
        for (let c = COLS / 2 - 3; c <= COLS / 2 + 2; c++) {
          if (getTile(c, r) === EMPTY) {
            setTile(c, r, BRICK);
          }
        }
      }
      break;
  }
  updateUI();
}

// --- 游戏流程 ---
function loadLevel(levelIndex) {
  const idx = levelIndex % MAPS.length;
  mapData = [...MAPS[idx]];

  // 清除旧敌人和子弹
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];
  enemySpawnQueue = [];

  // 重置敌人计数
  enemiesRemaining = 16 + currentLevel * 2;
  enemiesAlive = 0;
  maxEnemiesOnField = Math.min(6, 4 + Math.floor(currentLevel / 3));

  // 放置玩家
  const spawnCol = Math.floor(COLS / 2);
  const spawnRow = ROWS - 4;  // row 22: 在基地(row 24-25)上方，避免出生即碰撞
  player = new PlayerTank(
    spawnCol * TILE_SIZE - (TILE_SIZE * 2 - 2) / 2 + TILE_SIZE / 2,
    spawnRow * TILE_SIZE
  );
  player.invincibleTimer = 120; // 出生无敌

  // 设置敌人生成队列
  enemySpawnQueue = [];
  let spawnIdx = 0;
  for (let i = 0; i < enemiesRemaining; i++) {
    const type = i < 4 ? Math.min(3, Math.floor(i)) : Math.min(3, Math.floor(Math.random() * 4));
    const sp = spawnPoints[spawnIdx % 3];
    enemySpawnQueue.push({
      x: sp.col * TILE_SIZE + 1,
      y: sp.row * TILE_SIZE + 1,
      type,
    });
    spawnIdx++;
  }

  spawnTimer = 90; // 初始延迟
  gameState = STATE.playing;
  updateUI();
}

function spawnEnemy() {
  if (enemySpawnQueue.length === 0) return;
  if (enemiesAlive >= maxEnemiesOnField) return;

  const spawnData = enemySpawnQueue.shift();
  // 检查生成点是否被占据
  const spawnX = spawnData.x;
  const spawnY = spawnData.y;
  let blocked = false;

  if (player && player.alive) {
    if (Math.abs(player.x - spawnX) < 30 && Math.abs(player.y - spawnY) < 30) {
      blocked = true;
    }
  }
  for (const enemy of enemies) {
    if (enemy.alive && Math.abs(enemy.x - spawnX) < 30 && Math.abs(enemy.y - spawnY) < 30) {
      blocked = true;
      break;
    }
  }

  if (blocked) {
    // 重新入队
    enemySpawnQueue.push(spawnData);
    return;
  }

  const enemy = new EnemyTank(spawnX, spawnY, spawnData.type);
  enemy.invincibleTimer = 60;
  enemies.push(enemy);
  enemiesAlive++;
  enemiesRemaining--;
}

function gameOver() {
  gameState = STATE.gameover;
  sfxGameOver();
  updateUI();
}

function victory() {
  gameState = STATE.victory;
  currentLevel++;
  updateUI();
}

// --- 碰撞检测 ---
function checkBulletTankCollisions() {
  for (const bullet of bullets) {
    if (!bullet.alive) continue;

    if (bullet.owner === 'player') {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (
          bullet.x > enemy.x && bullet.x < enemy.x + enemy.w &&
          bullet.y > enemy.y && bullet.y < enemy.y + enemy.h
        ) {
          bullet.alive = false;
          if (enemy.hit()) {
            if (enemiesRemaining <= 0 && enemiesAlive <= 0 && enemySpawnQueue.length === 0) {
              victory();
            }
          }
          break;
        }
      }
    } else if (bullet.owner === 'enemy' && player && player.alive) {
      if (
        bullet.x > player.x && bullet.x < player.x + player.w &&
        bullet.y > player.y && bullet.y < player.y + player.h
      ) {
        bullet.alive = false;
        if (player.hit()) {
          lives--;
          updateUI();
          if (lives <= 0) {
            gameOver();
          } else {
            // 重生
            setTimeout(() => {
              const spawnCol = Math.floor(COLS / 2);
              const spawnRow = ROWS - 4;  // row 22: 在基地上方
              player = new PlayerTank(
                spawnCol * TILE_SIZE - (TILE_SIZE * 2 - 2) / 2 + TILE_SIZE / 2,
                spawnRow * TILE_SIZE
              );
              player.invincibleTimer = 120;
            }, 500);
          }
        }
      }
    }
  }
}

// --- UI更新 ---
function updateUI() {
  document.getElementById('levelDisplay').textContent = currentLevel + 1;
  document.getElementById('livesDisplay').textContent = lives;
  document.getElementById('scoreDisplay').textContent = score;

  const dotsEl = document.getElementById('enemyDots');
  const totalEnemies = enemiesRemaining + enemiesAlive + enemySpawnQueue.length;
  let dotsHTML = '';
  for (let i = 0; i < 20; i++) {
    const dead = i >= totalEnemies;
    dotsHTML += `<div class="enemy-dot${dead ? ' dead' : ''}"></div>`;
  }
  dotsEl.innerHTML = dotsHTML;
}

// --- 绘制地图 ---
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = getTile(c, r);
      if (tile === EMPTY || tile === TREE) continue;
      const x = c * TILE_SIZE;
      const y = r * TILE_SIZE;

      switch (tile) {
        case BRICK:
          ctx.fillStyle = '#c45d2c';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#d4894a';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE / 2);
          ctx.fillRect(x, y, TILE_SIZE / 4, TILE_SIZE);
          ctx.fillRect(x + TILE_SIZE / 2, y, TILE_SIZE / 4, TILE_SIZE);
          ctx.fillRect(x + TILE_SIZE * 3 / 4, y, TILE_SIZE / 4, TILE_SIZE);
          ctx.strokeStyle = '#9a3e1a';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
          break;
        case STEEL:
          ctx.fillStyle = '#8a8a8a';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#b0b0b0';
          ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
          ctx.fillStyle = '#ccc';
          ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
          break;
        case WATER:
          ctx.fillStyle = '#1a3a5c';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#2a6aac';
          for (let i = 0; i < 3; i++) {
            const wy = y + 2 + i * 5 + (frameCount % 40 < 20 ? 0 : 2);
            ctx.fillRect(x + 1, wy, TILE_SIZE - 2, 2);
          }
          break;
        case BASE:
          ctx.fillStyle = '#f5c842';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          // 鹰标志
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(x + 3, y + 2, 10, 10);
          ctx.fillStyle = '#f5c842';
          ctx.fillRect(x + 5, y + 4, 6, 6);
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(x + 7, y + 3, 2, 2);
          ctx.fillRect(x + 4, y + 6, 4, 2);
          break;
      }
    }
  }

  // 绘制树（在坦克上方）
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (getTile(c, r) === TREE) {
        const x = c * TILE_SIZE;
        const y = r * TILE_SIZE;
        ctx.fillStyle = '#2d5a1e';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = '#3a7a28';
        ctx.beginPath();
        ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#4a9a34';
        ctx.beginPath();
        ctx.arc(x + TILE_SIZE / 2 - 2, y + TILE_SIZE / 2 - 2, TILE_SIZE / 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// --- 绘制道具 ---
function drawPowerUps() {
  for (const pu of powerUps) {
    pu.timer--;
    if (pu.timer <= 0) continue;

    // 闪烁效果 (最后3秒)
    if (pu.timer < 180 && Math.floor(pu.timer / 15) % 2 === 0) continue;

    const cx = pu.x + pu.w / 2;
    const cy = pu.y + pu.h / 2;

    ctx.save();
    ctx.translate(cx, cy);

    // 背景
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(-pu.w / 2, -pu.h / 2, pu.w, pu.h);
    ctx.strokeStyle = '#f5c842';
    ctx.lineWidth = 2;
    ctx.strokeRect(-pu.w / 2, -pu.h / 2, pu.w, pu.h);

    // 图标
    ctx.fillStyle = '#f5c842';
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    switch (pu.type) {
      case 'star': ctx.fillText('⭐', 0, 0); break;
      case 'shield': ctx.fillText('🛡️', 0, 0); break;
      case 'bomb': ctx.fillText('💣', 0, 0); break;
      case 'clock': ctx.fillText('⏰', 0, 0); break;
      case 'shovel': ctx.fillText('🏗️', 0, 0); break;
    }

    ctx.restore();
  }
}

// --- 检查玩家与道具碰撞 ---
function checkPowerUpCollisions() {
  if (!player || !player.alive) return;
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (
      player.x < pu.x + pu.w &&
      player.x + player.w > pu.x &&
      player.y < pu.y + pu.h &&
      player.y + player.h > pu.y
    ) {
      applyPowerUp(pu.type);
      powerUps.splice(i, 1);
    }
  }
  // 清除过期道具
  powerUps = powerUps.filter(p => p.timer > 0);
}

// --- 绘制HUD ---
function drawHUD() {
  // 顶部信息
  ctx.fillStyle = '#f5c842';
  ctx.font = 'bold 10px "Courier New", "Microsoft YaHei", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Lv.${currentLevel + 1}`, 4, 10);
  ctx.fillText(`HP:${'❤️'.repeat(Math.max(0, lives))}`, 100, 10);
  ctx.textAlign = 'right';
  ctx.fillText(`⚔️ ${score}`, FIELD_W - 4, 10);
}

// --- 主游戏循环 ---
function update() {
  if (gameState !== STATE.playing) return;

  frameCount++;

  // 更新玩家
  if (player && player.alive) {
    player.update();
  }

  // 生成敌人
  spawnTimer--;
  if (spawnTimer <= 0 && enemySpawnQueue.length > 0 && enemiesAlive < maxEnemiesOnField) {
    spawnEnemy();
    spawnTimer = spawnInterval;
  }

  // 更新敌人
  for (const enemy of enemies) {
    if (enemy.alive) {
      if (enemy.invincibleTimer > 0) enemy.invincibleTimer--;
      enemy.update();
    }
  }

  // 更新子弹
  for (const bullet of bullets) {
    if (bullet.alive) bullet.update();
  }

  // 碰撞检测
  checkBulletTankCollisions();

  // 子弹之间的碰撞（偶尔会互相抵消）
  for (let i = 0; i < bullets.length; i++) {
    if (!bullets[i].alive) continue;
    for (let j = i + 1; j < bullets.length; j++) {
      if (!bullets[j].alive) continue;
      if (bullets[i].owner !== bullets[j].owner) {
        if (Math.abs(bullets[i].x - bullets[j].x) < 4 && Math.abs(bullets[i].y - bullets[j].y) < 4) {
          bullets[i].alive = false;
          bullets[j].alive = false;
        }
      }
    }
  }

  // 更新粒子
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }

  // 道具碰撞
  checkPowerUpCollisions();

  // 清理
  bullets = bullets.filter(b => b.alive);
  particles = particles.filter(p => p.life > 0);
  enemies = enemies.filter(e => e.alive);

  // 震屏衰减
  if (shakeTimer > 0) shakeTimer--;
  if (shakeTimer <= 0) shakeIntensity = 0;

  // 检查胜利条件
  if (gameState === STATE.victory) {
    // 延迟加载下一关
    setTimeout(() => loadLevel(currentLevel), 1000);
    gameState = STATE.playing;
  }

  updateUI();
}

function draw() {
  ctx.clearRect(0, 0, FIELD_W, FIELD_H);

  // 背景
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, FIELD_W, FIELD_H);

  // 震屏偏移
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // 绘制地图
  drawMap();

  // 绘制道具
  drawPowerUps();

  // 绘制玩家
  if (player && player.alive) player.draw(ctx);

  // 绘制敌人
  for (const enemy of enemies) {
    if (enemy.alive) {
      if (enemy.invincibleTimer > 0 && Math.floor(enemy.invincibleTimer / 4) % 2 === 0) continue;
      enemy.draw(ctx);
    }
  }

  // 绘制子弹
  for (const bullet of bullets) {
    if (bullet.alive) bullet.draw(ctx);
  }

  // 绘制粒子
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // 绘制HUD
  drawHUD();

  // 绘制覆盖层
  if (gameState === STATE.title) {
    drawOverlay('🎮 坦克大战', '按 Enter 开始游戏', '#f5c842');
  } else if (gameState === STATE.paused) {
    drawOverlay('⏸️ 暂停中', '按 P 继续', '#fff');
  } else if (gameState === STATE.gameover) {
    drawOverlay('💥 游戏结束', `得分: ${score} | 按 Enter 重新开始`, '#e94560');
  } else if (gameState === STATE.victory) {
    drawOverlay('🎉 关卡通过!', '准备下一关...', '#f5c842');
  }
}

function drawOverlay(title, subtitle, color) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.fillRect(0, 0, FIELD_W, FIELD_H);

  ctx.fillStyle = color;
  ctx.font = 'bold 28px "Courier New", "Microsoft YaHei", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(title, FIELD_W / 2, FIELD_H / 2 - 15);

  ctx.fillStyle = '#ddd';
  ctx.font = '14px "Courier New", "Microsoft YaHei", monospace';
  ctx.fillText(subtitle, FIELD_W / 2, FIELD_H / 2 + 20);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- 输入处理 ---
// 使用 e.code（物理键位码，不随键盘布局变化）做主要键位判断
const CODE_MAP = {
  'KeyW': 'w', 'KeyA': 'a', 'KeyS': 's', 'KeyD': 'd',
  'ArrowUp': 'arrowup', 'ArrowDown': 'arrowdown',
  'ArrowLeft': 'arrowleft', 'ArrowRight': 'arrowright',
  'Space': 'space', 'KeyJ': 'j', 'KeyP': 'p',
  'Enter': 'enter',
};

document.addEventListener('keydown', (e) => {
  initAudio();

  // 防止方向键和空格导致页面滚动
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
    e.preventDefault();
  }

  // 用 e.code 做可靠映射
  const codeKey = CODE_MAP[e.code];
  if (codeKey) keys[codeKey] = true;

  // 兼容 e.key（作为后备）
  const key = (e.key || '').toLowerCase();
  if (key) keys[key] = true;

  // 暂停
  if (e.code === 'KeyP' && (gameState === STATE.playing || gameState === STATE.paused)) {
    gameState = gameState === STATE.playing ? STATE.paused : STATE.playing;
  }

  // 开始/重新开始
  if (e.code === 'Enter') {
    if (gameState === STATE.title || gameState === STATE.gameover) {
      currentLevel = 0;
      score = 0;
      lives = 3;
      loadLevel(0);
    }
  }
});

document.addEventListener('keyup', (e) => {
  // 用 e.code 做可靠映射
  const codeKey = CODE_MAP[e.code];
  if (codeKey) keys[codeKey] = false;

  // 兼容 e.key
  const key = (e.key || '').toLowerCase();
  if (key) keys[key] = false;
});

// 点击画布开始 / 鼠标开火
canvas.addEventListener('click', (e) => {
  initAudio();
  if (gameState === STATE.title || gameState === STATE.gameover) {
    currentLevel = 0;
    score = 0;
    lives = 3;
    loadLevel(0);
  }
});

canvas.addEventListener('mousedown', () => {
  if (gameState === STATE.playing) {
    keys['space'] = true;
    keys['j'] = true;
  }
});

canvas.addEventListener('mouseup', () => {
  keys['space'] = false;
  keys['j'] = false;
});

// --- 移动端触控 ---
let touchDir = -1;
let touchFire = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  if (gameState === STATE.title || gameState === STATE.gameover) {
    currentLevel = 0;
    score = 0;
    lives = 3;
    loadLevel(0);
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches[0].clientX - rect.left;
  const ty = e.touches[0].clientY - rect.top;

  // 右半部分=开火, 左半=移动
  if (tx > FIELD_W / 2) {
    touchFire = true;
    keys['j'] = true;
  } else {
    const cx = FIELD_W / 4;
    const cy = FIELD_H / 2;
    const dx = tx - cx;
    const dy = ty - cy;
    if (Math.abs(dx) > Math.abs(dy)) {
      keys['d'] = dx > 0;
      keys['a'] = dx <= 0;
      keys['w'] = false;
      keys['s'] = false;
    } else {
      keys['s'] = dy > 0;
      keys['w'] = dy <= 0;
      keys['a'] = false;
      keys['d'] = false;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches[0].clientX - rect.left;
  const ty = e.touches[0].clientY - rect.top;
  if (tx > FIELD_W / 2) return;
  const cx = FIELD_W / 4;
  const cy = FIELD_H / 2;
  const dx = tx - cx;
  const dy = ty - cy;
  keys['a'] = false; keys['d'] = false; keys['w'] = false; keys['s'] = false;
  if (Math.abs(dx) > Math.abs(dy)) {
    keys['d'] = dx > 0;
    keys['a'] = dx <= 0;
  } else {
    keys['s'] = dy > 0;
    keys['w'] = dy <= 0;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  keys['w'] = false; keys['a'] = false; keys['s'] = false; keys['d'] = false;
  keys['j'] = false;
  touchFire = false;
});

// --- 初始化 ---
gameState = STATE.title;
mapData = [...MAPS[0]];
updateUI();

// --- 启动 ---
gameLoop();
</script>
